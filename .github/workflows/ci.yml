name: CI

on:
  push:
    branches: [main, gabo]
  pull_request:

jobs:
  backend:
    name: Backend (lint + migrate + seed + test)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: alenstec_test
          POSTGRES_USER: alenstec
          POSTGRES_PASSWORD: alenstec_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U alenstec -d alenstec_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    defaults:
      run:
        working-directory: backend

    env:
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: alenstec_test
      DB_USER: alenstec
      DB_PASSWORD: alenstec_test
      JWT_SECRET: ci_secret_at_least_32_characters_long_______
      SEED_DEFAULT_PASSWORD: ci_password
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Migrate (first run)
        run: npm run migrate

      - name: Migrate (second run — must be idempotent)
        run: npm run migrate

      - name: Seed
        run: npm run seed

      - name: Test
        run: npm test
