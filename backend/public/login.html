<!DOCTYPE html>
<html lang="es-MX">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Conciliación de Asistencia - Alenstec</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #333;
    }

    .login-container {
      background: white;
      border-radius: 8px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      width: 100%;
      max-width: 420px;
      padding: 40px;
    }

    .login-header {
      text-align: center;
      margin-bottom: 30px;
    }

    .login-header h1 {
      color: #1f4e78;
      font-size: 28px;
      margin-bottom: 8px;
    }

    .login-header p {
      color: #666;
      font-size: 14px;
    }

    .logo {
      width: 60px;
      height: 60px;
      background: #667eea;
      border-radius: 50%;
      margin: 0 auto 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      color: white;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      color: #333;
      font-weight: 600;
      font-size: 14px;
    }

    .form-group input,
    .form-group select {
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 14px;
      transition: border-color 0.3s;
    }

    .form-group input:focus,
    .form-group select:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .btn-login {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      margin-top: 10px;
    }

    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(102, 126, 234, 0.3);
    }

    .btn-login:active {
      transform: translateY(0);
    }

    .btn-login:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .alert {
      padding: 12px 16px;
      border-radius: 4px;
      margin-bottom: 20px;
      font-size: 14px;
      display: none;
    }

    .alert-error {
      background-color: #fee;
      color: #c33;
      border: 1px solid #fcc;
      display: block;
    }

    .alert-success {
      background-color: #efe;
      color: #3c3;
      border: 1px solid #cfc;
      display: block;
    }

    .loading {
      display: none;
      text-align: center;
      padding: 10px;
    }

    .spinner {
      border: 3px solid #f3f3f3;
      border-top: 3px solid #667eea;
      border-radius: 50%;
      width: 20px;
      height: 20px;
      animation: spin 1s linear infinite;
      margin: 0 auto 10px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .demo-users {
      background: #f9f9f9;
      border-top: 1px solid #eee;
      margin-top: 20px;
      padding-top: 20px;
      font-size: 13px;
    }

    .demo-users p {
      color: #666;
      margin-bottom: 10px;
      font-weight: 600;
    }

    .demo-user {
      background: white;
      padding: 8px;
      border-radius: 3px;
      margin-bottom: 6px;
      border-left: 3px solid #667eea;
      cursor: pointer;
      transition: background 0.2s;
    }

    .demo-user:hover {
      background: #f5f5f5;
    }

    .demo-user-email {
      color: #667eea;
      font-family: monospace;
      font-size: 12px;
    }

    .demo-user-pass {
      color: #666;
      font-size: 11px;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-header">
      <div class="logo">🕐</div>
      <h1>Conciliación</h1>
      <p>De Asistencia y Horas - Alenstec</p>
    </div>

    <form id="loginForm">
      <div id="alertMessage" class="alert"></div>

      <div class="form-group">
        <label for="email">Correo Electrónico</label>
        <input type="email" id="email" name="email" required placeholder="usuario@alenstec.com">
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input type="password" id="password" name="password" required placeholder="••••••••">
      </div>

      <div class="form-group">
        <label for="rol">Rol (para demo)</label>
        <select id="rol" name="rol">
          <option value="supervisor">Supervisor</option>
          <option value="jefe_area">Jefe de Área</option>
          <option value="rh">RH</option>
          <option value="admin">Administrador</option>
        </select>
      </div>

      <div class="loading" id="loading">
        <div class="spinner"></div>
        <p>Verificando credenciales...</p>
      </div>

      <button type="submit" class="btn-login" id="submitBtn">Ingresar</button>
    </form>

    <div class="demo-users">
      <p>👤 Usuarios de Prueba:</p>
      <div class="demo-user" onclick="setDemoUser('supervisor@alenstec.com', 'pass123', 'supervisor')">
        <div class="demo-user-email">supervisor@alenstec.com</div>
        <div class="demo-user-pass">Rol: Supervisor</div>
      </div>
      <div class="demo-user" onclick="setDemoUser('jefe@alenstec.com', 'pass123', 'jefe_area')">
        <div class="demo-user-email">jefe@alenstec.com</div>
        <div class="demo-user-pass">Rol: Jefe de Área</div>
      </div>
      <div class="demo-user" onclick="setDemoUser('rh@alenstec.com', 'pass123', 'rh')">
        <div class="demo-user-email">rh@alenstec.com</div>
        <div class="demo-user-pass">Rol: RH</div>
      </div>
      <div class="demo-user" onclick="setDemoUser('admin@alenstec.com', 'admin123', 'admin')">
        <div class="demo-user-email">admin@alenstec.com</div>
        <div class="demo-user-pass">Rol: Administrador</div>
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script>
    const form = document.getElementById('loginForm');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const rolInput = document.getElementById('rol');
    const alertMessage = document.getElementById('alertMessage');
    const loading = document.getElementById('loading');
    const submitBtn = document.getElementById('submitBtn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const email = emailInput.value.trim();
      const password = passwordInput.value;
      const rol = rolInput.value;

      if (!email || !password) {
        showAlert('Por favor completa todos los campos', 'error');
        return;
      }

      // Simular autenticación (en producción seria contra backend real)
      showLoading();
      
      try {
        // Generar token JWT simulado (válido por 24 horas)
        const token = generateMockJWT(email, rol);
        
        // Guardar datos en localStorage
        localStorage.setItem('jwt_token', token);
        localStorage.setItem('user_email', email);
        localStorage.setItem('user_rol', rol);

        // Simular delay de API
        await new Promise(resolve => setTimeout(resolve, 800));

        showAlert('✓ Sesión iniciada correctamente', 'success');
        
        // Redirigir después de 1s
        setTimeout(() => {
          window.location.href = '/conciliacion-semanal.html';
        }, 1000);

      } catch (error) {
        showAlert('Error al iniciar sesión: ' + error.message, 'error');
      } finally {
        hideLoading();
      }
    });

    function setDemoUser(email, password, rol) {
      emailInput.value = email;
      passwordInput.value = password;
      rolInput.value = rol;
      submitBtn.focus();
    }

    function showAlert(message, type) {
      alertMessage.textContent = message;
      alertMessage.className = `alert alert-${type}`;
    }

    function hideAlert() {
      alertMessage.className = 'alert';
    }

    function showLoading() {
      loading.style.display = 'block';
      submitBtn.disabled = true;
    }

    function hideLoading() {
      loading.style.display = 'none';
      submitBtn.disabled = false;
    }

    /**
     * Generar JWT simulado para demostración
     * En producción, esto vendría del servidor backend
     */
    function generateMockJWT(email, rol) {
      const header = btoa(JSON.stringify({ alg: 'HS256', typ: 'JWT' }));
      const payload = btoa(JSON.stringify({
        email,
        rol,
        user_id: Math.floor(Math.random() * 10000),
        iat: Math.floor(Date.now() / 1000),
        exp: Math.floor(Date.now() / 1000) + (24 * 60 * 60)
      }));
      const signature = btoa(email + rol + 'secret');
      return `${header}.${payload}.${signature}`;
    }

    // Focus en email input
    emailInput.focus();
  </script>
</body>
</html>
