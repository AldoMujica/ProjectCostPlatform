services:
  postgres-test:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: alenstec_test
      POSTGRES_USER: alenstec
      POSTGRES_PASSWORD: alenstec_test
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alenstec -d alenstec_test"]
      interval: 2s
      timeout: 5s
      retries: 15
